<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultório - AmorSaúde</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
    /* Fundo geral */
    body {
      background-color: #ffffff;
    }

    /* Cartões */
    .card {
      margin-bottom: 20px;
      border-radius: 14px;
      border: 1px solid #ccefff;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.07);
    }

    /* Títulos dos cards (Ciano principal AmorSaúde #00CFE6) */
    .card-header {
      background-color: #00cfe6 !important;
      color: white !important;
      font-weight: bold;
    }

    /* Navbar estilo AmorSaúde com detalhe vermelho */
    .navbar {
      background-color: #00cfe6 !important;
      box-shadow: 0 2px 15px rgba(0, 0, 0, 0.2);
      border-bottom: 4px solid #d60000; /* detalhe vermelho */
    }

    /* Botões personalizados */
    .btn-primary {
      background-color: #00cfe6;
      border: none;
    }

    .btn-success {
      background-color: #00cfe6;
      border: none;
    }

    .btn-warning {
      background-color: #00cfe6;
      border: none;
      color: white;
    }

    .btn-info {
      background-color: #00cfe6;
      border: none;
    }

    /* Botões com vermelho */
    .btn-danger {
      background-color: #d60000;
      border: none;
    }

    /* Modal */
    .modal-header {
      background-color: #00cfe6;
      color: white;
      border-bottom: 4px solid #d60000; /* detalhe vermelho */
    }

    .btn-close-white {
      filter: invert(1);
    }

    /* Tabela */
    .table thead {
      background-color: #00cfe6;
      color: white;
    }

    .table-hover tbody tr:hover {
      background-color: #e3fbff;
    }

    /* Status */
    .status-concluida {
      color: #009900;
      font-weight: bold;
    }

    .status-cancelada {
      color: #d60000; /* vermelho forte */
      font-weight: bold;
    }

    /* Destaques vermelhos adicionais */
    .highlight-red {
      border-left: 4px solid #d60000;
      padding-left: 8px;
    }
</style>

</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="./logotipo/logo barra.png" alt="Logo" height="40" class="me-2">
        AmorSaúde - Sistema
      </a>
    </div>
  </nav>

  <div class="container py-4">

    <!-- Menu de Ações -->
    <div class="row mb-4 text-center">

      <div class="col-md-3 mb-2">
        <button class="btn btn-primary w-100" onclick="window.location.href='cadastrar_paciente.html'">
          <i class="bi bi-person-plus-fill"></i> Cadastrar Paciente
        </button>
      </div>

      <div class="col-md-3 mb-2">
        <button class="btn btn-primary w-100" onclick="window.location.href='cadastrar_profissional.html'">
          <i class="bi bi-person-badge-fill"></i> Cadastrar Profissional
        </button>
      </div>

      <div class="col-md-3 mb-2">
        <button class="btn btn-primary w-100" onclick="window.location.href='agendar_consulta.html'">
          <i class="bi bi-calendar-plus-fill"></i> Agendar Consulta
        </button>
      </div>

      <div class="col-md-3 mb-2">
        <button class="btn btn-info w-100" id="btnExportPDF">
          <i class="bi bi-file-earmark-pdf-fill"></i> Exportar PDF
        </button>
      </div>

    </div>

    <!-- Filtros -->
    <div class="row mb-4">
      <div class="col-md-6 mb-2">
        <input type="date" id="filterDate" class="form-control">
      </div>
      <div class="col-md-6 mb-2">
        <select id="filterProfissional" class="form-select">
          <option value="">Filtrar por profissional</option>
        </select>
      </div>
    </div>

    <!-- Seções de Pacientes e Profissionais -->
    <div class="row">
      <div class="col-md-6">
        <div class="card mb-4">
          <div class="card-header">Pacientes</div>
          <ul class="list-group list-group-flush" id="listaPacientes"></ul>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card mb-4">
          <div class="card-header">Profissionais</div>
          <ul class="list-group list-group-flush" id="listaProfissionais"></ul>
        </div>
      </div>
    </div>

    <!-- Consultas -->
    <div class="card mt-3">
      <div class="card-header" style="background-color: var(--ciano-claro); color: black;">Consultas</div>

      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>Data</th>
              <th>Hora</th>
              <th>Paciente</th>
              <th>Profissional</th>
              <th>Procedimento</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="listaConsultas"></tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const pacientes = [];
    const profissionais = [];
    const consultas = [];

    const listaPacientes = document.getElementById('listaPacientes');
    const listaProfissionais = document.getElementById('listaProfissionais');
    const listaConsultas = document.getElementById('listaConsultas');
    const selectPaciente = document.getElementById('selectPaciente');
    const selectProfissional = document.getElementById('selectProfissional');
    const filterDate = document.getElementById('filterDate');
    const filterProfissional = document.getElementById('filterProfissional');

    function atualizarListas() {
      listaPacientes.innerHTML = "";
      listaProfissionais.innerHTML = "";
      listaConsultas.innerHTML = "";

      pacientes.forEach((p, i) => {
        listaPacientes.innerHTML += `<li class="list-group-item">${p.nome} - ${p.idade} anos</li>`;
      });

      profissionais.forEach((p, i) => {
        listaProfissionais.innerHTML += `<li class="list-group-item">${p.nome} - ${p.especialidade}</li>`;
      });

      let filtradas = consultas;

      if (filterDate.value)
        filtradas = filtradas.filter(c => c.data === filterDate.value);

      if (filterProfissional.value)
        filtradas = filtradas.filter(c => c.profissional === filterProfissional.value);

      filtradas.forEach((c, i) => {
        listaConsultas.innerHTML += `
          <tr>
            <td>${c.data}</td>
            <td>${c.hora}</td>
            <td>${c.paciente}</td>
            <td>${c.profissional}</td>
            <td>${c.procedimento}</td>
            <td class="${c.status == 'Concluída' ? 'status-concluida' : c.status == 'Cancelada' ? 'status-cancelada' : ''}">
              ${c.status || ''}
            </td>
            <td>
              <button class="btn btn-sm btn-success" onclick="mudarStatus(${i},'Concluída')"><i class="bi bi-check-lg"></i></button>
              <button class="btn btn-sm btn-danger" onclick="mudarStatus(${i},'Cancelada')"><i class="bi bi-x-lg"></i></button>
            </td>
          </tr>
        `;
      });
    }

    function mudarStatus(i, status) {
      consultas[i].status = status;
      atualizarListas();
    }

    document.getElementById('btnExportPDF').onclick = () => {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();

      pdf.text("Consultas - AmorSaúde", 20, 20);

      consultas.forEach((c, i) => {
        pdf.text(`${i + 1}. ${c.data} ${c.hora} - ${c.paciente} (${c.procedimento})`, 20, 30 + i * 8);
      });

      pdf.save("consultas.pdf");
    };

    atualizarListas();
  </script>

</body>

</html>
