<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Profissional</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #e6faff; /* fundo ciano claríssimo */
        }

        .navbar {
            background-color: #00bcd4; /* ciano */
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
        }

        .navbar-brand {
            font-weight: 600;
        }

        .card {
            border-radius: 14px;
            border: none;
            background: #ffffff;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
            border-top: 4px solid #00bcd4; /* detalhe ciano */
        }

        h4 {
            color: #00bcd4;
            border-left: 4px solid red;
            padding-left: 10px;
            font-weight: 600;
        }

        label {
            font-weight: 500;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(0, 188, 212, 0.35);
            border-color: #00bcd4;
        }

        .btn-custom {
            background-color: #00bcd4;
            color: #fff;
            font-weight: 600;
            border-radius: 8px;
            transition: 0.3s;
            border-left: 5px solid red;
        }

        .btn-custom:hover {
            background-color: #009eb3;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container-fluid">
            <a class="navbar-brand text-white d-flex align-items-center" href="index.html">
                <img src="./logotipo/logo barra.png" alt="Logo" height="40" class="me-2">
                AmorSaúde - Profissionais
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="card p-4 mx-auto" style="max-width: 700px;">
            <h4 class="mb-4">Cadastrar Profissional</h4>

            <form id="formProfissional">

                <div class="mb-3">
                    <label>Nome completo</label>
                    <input type="text" id="nomeProfissional" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Especialidade</label>
                    <input type="text" id="especialidadeProfissional" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Documento</label>
                    <input type="text" id="docProfissional" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>CRM</label>
                    <input type="text" id="crmProfissional" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-custom w-100">
                    <i class="bi bi-person-badge-fill"></i> Salvar Profissional
                </button>

            </form>
        </div>
    </div>

    <script>
        document.getElementById('formProfissional').addEventListener('submit', function (e) {
            e.preventDefault();

            const profissional = {
                nome: nomeProfissional.value,
                especialidade: especialidadeProfissional.value,
                doc: docProfissional.value,
                crm: crmProfissional.value
            };

            localStorage.setItem("novoProfissional", JSON.stringify(profissional));

            alert("Profissional cadastrado com sucesso!");

            window.location.href = "index.html";
        });
    </script>

</body>

</html>
