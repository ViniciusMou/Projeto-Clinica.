<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Paciente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #e6faff; /* ciano bem claro */
        }

        .navbar {
            background-color: #00bcd4; /* ciano */
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
        }

        .navbar-brand {
            font-weight: 600;
            color: white !important;
        }

        .card {
            border-radius: 14px;
            border: none;
            background: #ffffff;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
            border-top: 4px solid #00bcd4;
        }

        h4 {
            color: #00bcd4;
            border-left: 5px solid red;
            padding-left: 10px;
            font-weight: 700;
        }

        h6 {
            color: #00bcd4;
            border-left: 4px solid red;
            padding-left: 8px;
            margin-top: 20px;
            font-weight: 600;
        }

        .form-control:focus,
        textarea:focus {
            box-shadow: 0 0 0 0.18rem rgba(0, 188, 212, 0.40);
            border-color: #00bcd4;
        }

        .btn-custom {
            background-color: #00bcd4;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            transition: 0.3s;
            border-left: 6px solid red;
        }

        .btn-custom:hover {
            background-color: #009eb3;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="./logotipo/logo barra.png" alt="Logo" height="40" class="me-2">
                AmorSaúde - Pacientes
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="card p-4 mx-auto" style="max-width: 900px;">
            <h4 class="mb-3">Cadastrar Paciente</h4>

            <form id="formPaciente">

                <h6>Dados Pessoais</h6>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Nome</label>
                        <input type="text" id="nomePaciente" class="form-control" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Idade</label>
                        <input type="number" id="idadePaciente" class="form-control" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Documento</label>
                        <input type="text" id="docPaciente" class="form-control" required>
                    </div>
                </div>

                <h6>Endereço</h6>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Rua</label>
                        <input type="text" id="ruaPaciente" class="form-control" required>
                    </div>
                    <div class="col-md-2 mb-3">
                        <label>Número</label>
                        <input type="number" id="numeroPaciente" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Bairro</label>
                        <input type="text" id="bairroPaciente" class="form-control" required>
                    </div>
                </div>

                <h6>Contato de Emergência</h6>
                <div class="mb-3">
                    <label>Telefone</label>
                    <input type="text" id="emergenciaPaciente" class="form-control" required>
                </div>

                <h6>Saúde</h6>
                <div class="mb-3">
                    <label>Alergia a medicação</label>
                    <textarea id="alergiaPaciente" class="form-control"></textarea>
                </div>

                <div class="mb-4">
                    <label>Histórico</label>
                    <textarea id="historicoPaciente" class="form-control"></textarea>
                </div>

                <button type="submit" class="btn btn-custom w-100">
                    <i class="bi bi-person-plus-fill"></i> Salvar Paciente
                </button>

            </form>
        </div>
    </div>

    <script>
        document.getElementById('formPaciente').addEventListener('submit', function (e) {
            e.preventDefault();

            const paciente = {
                nome: nomePaciente.value,
                idade: idadePaciente.value,
                doc: docPaciente.value,
                rua: ruaPaciente.value,
                numero: numeroPaciente.value,
                bairro: bairroPaciente.value,
                emergencia: emergenciaPaciente.value,
                alergia: alergiaPaciente.value,
                historico: historicoPaciente.value
            };

            localStorage.setItem("novoPaciente", JSON.stringify(paciente));

            alert("Paciente cadastrado com sucesso!");

            window.location.href = "index.html";
        });
    </script>

</body>

</html>
